
spring.application.name=botleague-backend
server.port=8081

# Disable devtools restart classloader — it prevents spring-websocket JARs
# from being visible during ASM component scanning at startup.
spring.devtools.restart.enabled=false

# ── Logging: silence noisy but expected Spring MVC warnings ──────────────
# ApiException, 404, 405 etc. are handled by GlobalExceptionHandler and
# return proper JSON. Spring's own ExceptionHandlerExceptionResolver still
# logs them at WARN by default — suppress to ERROR so only truly unexpected
# exceptions appear in the log at WARN/ERROR level.
logging.level.org.springframework.web.servlet.mvc.method.annotation.ExceptionHandlerExceptionResolver=ERROR
logging.level.org.springframework.web.servlet.resource.NoResourceFoundException=ERROR
logging.level.org.springframework.web.servlet.PageNotFound=ERROR


server.tomcat.threads.max=80
server.tomcat.threads.min-spare=10
server.tomcat.accept-count=100
server.tomcat.max-connections=8192


spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/BotLeague_Test}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
# Local-machine-only default (production requires SPRING_DATASOURCE_PASSWORD
# with no fallback via docker-compose.prod.yml, so this never applies there).
# Still worth changing on this machine at your convenience.
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin123}

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=3000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.pool-name=botleague-pool


spring.jpa.open-in-view=false


# ── Flyway ─────────────────────────────────────────────────────────────
# Schema is now migration-owned (src/main/resources/db/migration), not
# Hibernate-owned. baseline-on-migrate marks whatever schema already exists
# (built up over time via the old ddl-auto=update) as version 0, so V1+
# migrations apply cleanly on top without needing a hand-written dump of
# the pre-Flyway schema.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# ddl-auto now only VALIDATES entity mappings against the migration-owned
# schema — it no longer mutates schema itself.
spring.jpa.hibernate.ddl-auto=validate


spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true


# Local-dev-only placeholder (valid base64, decodes to a throwaway key) — every
# real deployment MUST set SECURITY_JWT_SECRET via env var. Generate a real one
# with: openssl rand -base64 48
security.jwt.secret=${SECURITY_JWT_SECRET:Q0hBTkdFLU1FLU5PVC1BLVJFQUwtU0VDUkVULVNFVC1WSUEtRU5WLVZBUi0xMjM0NTY3ODkwQUI=}


security.jwt.access-ttl-seconds=900


security.refresh.ttl-days=30


security.bcrypt.strength=11


security.bcrypt.max-concurrent-hashes=2


rate-limit.login-per-minute=5
rate-limit.forgot-password-per-minute=3
rate-limit.otp-per-minute=3
rate-limit.register-per-minute=5

# ==============================================================
#  MSG91 (OTP provider) — MUST be set via env var (MSG91_AUTH_KEY /
#  MSG91_TEMPLATE_ID) in every real deployment. The fallbacks below are
#  non-functional placeholders, not real credentials — OTP sending will
#  fail loudly (not silently) if these are ever actually used.
# ==============================================================
msg91.auth-key=${MSG91_AUTH_KEY:CHANGE_ME_MSG91_AUTH_KEY}
msg91.template-id=${MSG91_TEMPLATE_ID:CHANGE_ME_MSG91_TEMPLATE_ID}

# ==============================================================
#  MAIL (Gmail SMTP) — MUST be set via env var in every real deployment.
# ==============================================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:CHANGE_ME_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD:CHANGE_ME_MAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true


app.frontend.url=${APP_FRONTEND_URL:https://test.botleague.in}
app.cookie.secure=${APP_COOKIE_SECURE:true}

# Cloudflare R2 — MUST be set via env var in every real deployment.
r2.account-id=${R2_ACCOUNT_ID:CHANGE_ME_R2_ACCOUNT_ID}
r2.access-key=${R2_ACCESS_KEY:CHANGE_ME_R2_ACCESS_KEY}
r2.secret-key=${R2_SECRET_KEY:CHANGE_ME_R2_SECRET_KEY}
r2.bucket=${R2_BUCKET:botleague-assets}
r2.public-url=${R2_PUBLIC_URL:https://media.botleague.in}

upload.max-size-bytes=${UPLOAD_MAX_SIZE_BYTES:52428800}
upload.video-max-size-bytes=${UPLOAD_VIDEO_MAX_SIZE_BYTES:524288000}