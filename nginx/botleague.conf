# ─────────────────────────────────────────────────────────────────────────────
# BotLeague Nginx configuration
# Place at: /etc/nginx/sites-available/botleague.conf
# Enable:   ln -s /etc/nginx/sites-available/botleague.conf /etc/nginx/sites-enabled/
#
# After deploying run:  sudo certbot --nginx -d test.botleague.in -d api.botleague.in
# Certbot will add the SSL blocks automatically.
# ─────────────────────────────────────────────────────────────────────────────

# ── Frontend: test.botleague.in ───────────────────────────────────────────────
server {
    listen 80;
    server_name test.botleague.in;

    # Let certbot handle ACME challenges
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name test.botleague.in;

    # SSL certificates — populated by certbot
    ssl_certificate     /etc/letsencrypt/live/test.botleague.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/test.botleague.in/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Proxy to frontend container
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# ── Backend: api.botleague.in ─────────────────────────────────────────────────
server {
    listen 80;
    server_name api.botleague.in;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name api.botleague.in;

    ssl_certificate     /etc/letsencrypt/live/test.botleague.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/test.botleague.in/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Increase body size for file uploads
    client_max_body_size 20M;

    # REST API
    location /api/ {
        proxy_pass         http://127.0.0.1:8081/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # WebSocket (STOMP over WS)
    location /ws {
        proxy_pass         http://127.0.0.1:8081/ws;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 3600s;
    }
}
