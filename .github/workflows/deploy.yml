name: Build & Deploy — BotLeague

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  # ── Job 1: verify build passes before deploying ─────────────────────────────
  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build backend (skip tests)
        run: mvn package -DskipTests -B -q
        working-directory: botleague-backend

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Botleague-Frontend/package-lock.json

      - name: Install & type-check frontend
        working-directory: Botleague-Frontend
        env:
          VITE_API_URL: https://api.botleague.in/api
        run: |
          npm ci --silent
          npm run build

  # ── Job 2: deploy to VPS (only after build passes) ──────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-check
    environment: production   # requires manual approval if configured in repo settings

    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd /opt/botleague

            echo "── Pulling latest code ──"
            git pull origin main

            echo "── Rebuilding and restarting services ──"
            docker compose -f docker-compose.prod.yml build --no-cache --parallel
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            echo "── Waiting for backend health ──"
            sleep 10
            for i in $(seq 1 12); do
              if curl -sf http://localhost:8081/api/health > /dev/null 2>&1; then
                echo "Backend is healthy"
                break
              fi
              echo "  attempt $i/12 — waiting..."
              sleep 10
            done

            echo "── Pruning unused Docker objects ──"
            docker system prune -f --volumes=false

            echo "── Deploy complete ──"
